name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install Ruff
        run: uv pip install --system "ruff>=0.4.0"

      - name: Ruff lint
        run: ruff check src/ tests/ train.py evaluate.py inference.py

      - name: Ruff format check
        run: ruff format --check src/ tests/ train.py evaluate.py inference.py

  # ── Tests ───────────────────────────────────────────────────────────────────
  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install project + dev dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=src --cov-report=term-missing

  # ── Structure validation ────────────────────────────────────────────────────
  validate-structure:
    name: Validate repo structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required files
        run: |
          set -e
          REQUIRED_FILES="train.py evaluate.py inference.py pyproject.toml Dockerfile"
          REQUIRED_DIRS="src configs tests"
          for f in $REQUIRED_FILES; do
            [ -f "$f" ] || { echo "ERROR: missing file $f"; exit 1; }
          done
          for d in $REQUIRED_DIRS; do
            [ -d "$d" ] || { echo "ERROR: missing directory $d"; exit 1; }
          done
          echo "All required files and directories present."

      - name: Validate YAML configs
        run: |
          python -c "
          import yaml, sys
          for f in ['configs/base.yaml','configs/data.yaml','configs/model.yaml','configs/training.yaml']:
              with open(f) as fh:
                  yaml.safe_load(fh)
              print(f'OK: {f}')
          "

  # ── Docker build (main branch only) ─────────────────────────────────────────
  docker-build:
    name: Build Docker image
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [lint, test, validate-structure]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: image-classifier:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
